name: Security Checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Python dependency audit
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          # PYSEC-2022-252: deep-translator 1.11.4 SSRF advisory.
          # No patched version exists (1.11.4 is the latest release as of 2026).
          # Risk is mitigated: translation is triggered only by authenticated
          # internal pipeline calls; user input is post text, not translator URLs.
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-252
      - name: Frontend dependency audit
        working-directory: frontend
        run: |
          npm install
          npm audit --audit-level=high
