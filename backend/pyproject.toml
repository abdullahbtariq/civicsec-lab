[tool.black]
line-length = 100
target-version = ["py312"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "DJ"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"apps/*/migrations/*.py" = ["E501"]
"apps/loglens/services/*.py" = ["E501"]
"apps/loglens/views.py" = ["E501"]
"apps/privacy_doctor/services/*.py" = ["E501"]
"apps/privacy_doctor/views.py" = ["E501"]
"apps/privacy_doctor/urls.py" = ["E501"]
"apps/incidents/services/*.py" = ["E501"]
"apps/incidents/urls.py" = ["E501"]
"apps/incidents/serializers.py" = ["E501"]
"apps/incidents/management/commands/*.py" = ["E501"]
"apps/misinformation/services/*.py" = ["E501"]
"apps/misinformation/views.py" = ["E501"]
"apps/misinformation/urls.py" = ["E501"]
"apps/misinformation/management/commands/*.py" = ["E501"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "civicsec.settings.test"
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-ra"
