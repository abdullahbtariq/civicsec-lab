services:
  backend:
    environment:
      DEBUG: "True"
    volumes:
      - ./backend:/app

  frontend:
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  celery-worker:
    volumes:
      - ./backend:/app

  celery-beat:
    volumes:
      - ./backend:/app

volumes:
  frontend_node_modules:
