<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- App-icon: brand navy rounded square + radar/orbital mark -->
  <rect width="64" height="64" rx="14" fill="#0f2230"/>
  <g>
    <!-- construction axes (subtle) -->
    <line x1="32" y1="10" x2="32" y2="54" stroke="#f3eadc" stroke-opacity="0.22" stroke-width="1"/>
    <line x1="10" y1="32" x2="54" y2="32" stroke="#f3eadc" stroke-opacity="0.22" stroke-width="1"/>
    <!-- left half: solid "evidence" quadrants -->
    <path d="M32 32 L10 32 A22 22 0 0 0 32 54 Z" fill="#d65a29"/>
    <path d="M32 32 L10 32 A22 22 0 0 1 32 10 Z" fill="#2a4a5e"/>
    <!-- right half: radar field rings -->
    <path d="M32 17 A15 15 0 0 1 32 47" stroke="#f3eadc" stroke-opacity="0.45" stroke-width="1" fill="none"/>
    <path d="M32 24 A8 8 0 0 1 32 40" stroke="#f3eadc" stroke-opacity="0.55" stroke-width="1" fill="none"/>
    <!-- radar sweep -->
    <line x1="32" y1="32" x2="49" y2="18" stroke="#f3eadc" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="2 2"/>
    <!-- dispersed signal nodes -->
    <circle cx="43" cy="21" r="2" fill="#d65a29"/>
    <circle cx="49" cy="30" r="1.6" fill="#f3eadc"/>
    <circle cx="45" cy="40" r="1.6" fill="#f3eadc"/>
    <circle cx="39" cy="25" r="1.3" fill="#d65a29"/>
    <circle cx="47" cy="45" r="1.6" fill="#d65a29"/>
    <circle cx="52" cy="36" r="1.3" fill="#f3eadc"/>
    <!-- origin -->
    <circle cx="32" cy="32" r="2.6" fill="#d65a29"/>
    <!-- disc edge -->
    <circle cx="32" cy="32" r="22" stroke="#f3eadc" stroke-opacity="0.85" stroke-width="1.5" fill="none"/>
  </g>
</svg>
